project:
  type: website
  output-dir: _site
  pre-render:
    - scripts/render-slides.sh
  render:
    - "**/*.qmd"
    - "!slides/**"
    - "notebooks/*.Rmd"
    - "exercises/mlss2026-lab-exercises.qmd"
    - "exercises/index.qmd"
    - "exercises/solutions/*.{Rmd,qmd}"

website:
  title: "Machine Learning Summer School 2026"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: curriculum-outline.qmd
        text: Curriculum
      - href: data/index.qmd
        text: Data
      - href: slides/day-01-monday.html
        text: Day 1 (Monday)
      - href: slides/day-02-tuesday.html
        text: Day 2 (Tuesday)
      - href: slides/day-04-thursday.html
        text: Day 4 (Thursday)
      - href: exercises/index.qmd
        text: Lab exercises
      - href: modules/index.qmd
        text: Modules
      - text: Notebooks
        menu:
          - text: Student notebooks
            href: notebooks/index.qmd
          - text: Linear regression + LASSO (genes)
            href: notebooks/linear-regression-lasso.Rmd
          - text: Logistic regression + tree (genes)
            href: notebooks/logistic-regression-gene-disease.Rmd
          - text: Penguins — body mass (regression)
            href: notebooks/penguins-body-mass.Rmd
          - text: Penguins — canonical pipeline
            href: notebooks/penguins-canonical-pipeline.Rmd
          - text: Penguins — classification
            href: notebooks/penguins-classification.Rmd
          - text: Penguins — sex (binary)
            href: notebooks/penguins-sex-classification.Rmd
          - text: Penguins — three species
            href: notebooks/penguins-species-multiclass.Rmd
          - text: Penguins — multiclass upsampling
            href: notebooks/penguins-multiclass-upsampling.Rmd
          - text: Penguins — SHAP
            href: notebooks/penguins-shap.Rmd
          - text: Penguins — PCA
            href: notebooks/penguins-pca.Rmd

format:
  html:
    theme: lux
    toc: true
    css: assets/css/hub.css

execute:
  freeze: auto
